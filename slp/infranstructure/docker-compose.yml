services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mail:
      build: ./mail
      container_name: mail
      ports:
        - "${MAIL_PORT}:${MAIL_PORT}"
      env_file:
        - .env

  backend-dotnet-img:
    build: ../backend-dotnet
    container_name: backend-dotnet-container
    ports:
      - "${BACKEND_DOTNET_PORT}:${BACKEND_DOTNET_PORT}"
    env_file:
      - .env
    depends_on:
      # - postgres
      - redis
      - mail

  frontend-vue-img:
    build: ../frontend-vue
    container_name: frontend-vue-container
    ports:
      - "${VITE_FRONTEND_PORT}:${VITE_FRONTEND_PORT}"
    env_file:
      - .env
    depends_on:
      - backend-dotnet-img
   
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-container
    ports:
      - "${LLAMA_PORT}:${LLAMA_PORT}"
    env_file:
      - .env
    volumes:
      - "${LLAMA_MODEL_VOLUME_PATH}:/models"
    command: >
      -m /models/${LLAMA_MODEL_NAME}
      --host 0.0.0.0
      --port ${LLAMA_PORT}

volumes:
  redis_data:
  kafka_data: