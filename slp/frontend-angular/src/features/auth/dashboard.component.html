<div class="space-y-6">
  <!-- Welcome header -->
  <div *ngIf="user$ | async as user">
    <h1 class="text-2xl font-bold text-gray-900">
      Welcome back, {{ user.username }}! 👋
    </h1>
    <p class="text-gray-500 mt-1">Here's what's happening with your learning today.</p>

    <!-- Email verification banner -->
    <nz-card *ngIf="!user.emailVerified" class="mt-4 border-yellow-300 bg-yellow-50">
      <div class="flex items-center gap-2 text-yellow-700">
        <span class="font-medium">⚠️ Please verify your email address to unlock all features.</span>
      </div>
    </nz-card>
  </div>

  <!-- Placeholder stats -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col [nzSpan]="12">
      <nz-card>
        <nz-statistic nzTitle="My Quizzes" [nzValue]="0"></nz-statistic>
      </nz-card>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-card>
        <nz-statistic nzTitle="Questions" [nzValue]="0"></nz-statistic>
      </nz-card>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-card>
        <nz-statistic nzTitle="Sources" [nzValue]="0"></nz-statistic>
      </nz-card>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-card>
        <nz-statistic nzTitle="Notes" [nzValue]="0"></nz-statistic>
      </nz-card>
    </div>
  </div>
</div>
