<div
  data-testid="reset-password-container"
  class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4"
>
  <nz-card data-testid="reset-password-card" class="w-full max-w-md shadow-lg">
    <div data-testid="reset-password-header" class="text-center mb-8">
      <h1
        data-testid="reset-password-title"
        class="text-2xl font-bold text-gray-900"
      >
        Reset Password
      </h1>
      <p data-testid="reset-password-subtitle" class="text-gray-500 mt-1">
        Enter your new password below
      </p>
    </div>

    <form
      data-testid="reset-password-form"
      nz-form
      [formGroup]="form"
      (ngSubmit)="handleReset()"
      nzLayout="vertical"
    >
      <!-- New Password -->
      <nz-form-item data-testid="form-item-new-password">
        <nz-form-label nzRequired>New Password</nz-form-label>
        <nz-form-control
          [nzValidateStatus]="
            form.get('password')?.invalid && form.get('password')?.dirty
              ? 'error'
              : ''
          "
          nzErrorTip="Password must be at least 6 characters"
        >
          <nz-input-group
            nzSize="large"
            [nzPrefix]="prefixLock1"
            [nzSuffix]="suffixEye1"
          >
            <input
              data-testid="input-new-password"
              nz-input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter new password"
            />
          </nz-input-group>
          <ng-template #prefixLock1>
            <i
              nz-icon
              nzType="lock"
              nzTheme="outline"
              class="text-gray-400"
            ></i>
          </ng-template>
          <ng-template #suffixEye1>
            <i
              nz-icon
              [nzType]="showPassword ? 'eye' : 'eye-invisible'"
              nzTheme="outline"
              class="text-gray-400 cursor-pointer"
              (click)="showPassword = !showPassword"
            ></i>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <!-- Confirm Password -->
      <nz-form-item data-testid="form-item-confirm-password">
        <nz-form-label nzRequired>Confirm Password</nz-form-label>
        <nz-form-control
          [nzValidateStatus]="passwordMismatch ? 'error' : ''"
          nzErrorTip="Passwords do not match"
        >
          <nz-input-group
            nzSize="large"
            [nzPrefix]="prefixLock2"
            [nzSuffix]="suffixEye2"
          >
            <input
              data-testid="input-confirm-password"
              nz-input
              [type]="showConfirmPassword ? 'text' : 'password'"
              formControlName="confirm"
              placeholder="Confirm new password"
            />
          </nz-input-group>
          <ng-template #prefixLock2>
            <i
              nz-icon
              nzType="lock"
              nzTheme="outline"
              class="text-gray-400"
            ></i>
          </ng-template>
          <ng-template #suffixEye2>
            <i
              nz-icon
              [nzType]="showConfirmPassword ? 'eye' : 'eye-invisible'"
              nzTheme="outline"
              class="text-gray-400 cursor-pointer"
              (click)="showConfirmPassword = !showConfirmPassword"
            ></i>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <!-- Submit -->
      <button
        data-testid="button-submit"
        nz-button
        nzType="primary"
        nzBlock
        nzSize="large"
        [nzLoading]="loading"
        [disabled]="!token"
        type="submit"
        class="mb-4"
      >
        Reset Password
      </button>

      <div data-testid="back-to-login-container" class="text-center text-sm">
        <a
          data-testid="back-to-login-link"
          routerLink="/login"
          class="text-blue-600 hover:text-blue-700"
          >Back to Login</a
        >
      </div>
    </form>

    <nz-alert
      *ngIf="error"
      data-testid="error-alert"
      [nzMessage]="error"
      nzType="error"
      nzShowIcon
      nzCloseable
      (nzOnClose)="error = ''"
      class="mt-4"
    ></nz-alert>
  </nz-card>
</div>
