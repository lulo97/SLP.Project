<div
  class="min-h-screen bg-linear-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4"
>
  <nz-card class="w-full max-w-md shadow-lg border-0">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
      <p class="text-gray-500 mt-2">Sign in to your account to continue</p>
    </div>

    <form nz-form (ngSubmit)="handleLogin()" [nzLayout]="'vertical'">
      <nz-form-item>
        <nz-form-label nzRequired>Username</nz-form-label>
        <nz-form-control [nzErrorTip]="usernameError">
          <nz-input-group nzPrefixIcon="user" nzSize="large">
            <input
              nz-input
              [(ngModel)]="form.username"
              name="username"
              placeholder="Enter your username"
              (input)="clearFieldError('username')"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="mb-2">
        <nz-form-label nzRequired>Password</nz-form-label>
        <nz-form-control [nzErrorTip]="passwordError">
          <nz-input-group nzPrefixIcon="lock" nzSize="large">
            <input
              nz-input
              type="password"
              [(ngModel)]="form.password"
              name="password"
              placeholder="Enter your password"
              (input)="clearFieldError('password')"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <div class="flex items-center justify-end mb-6">
        <a
          (click)="showForgotPassword = true"
          class="text-sm font-medium text-blue-600 hover:text-indigo-500 transition-colors"
        >
          Forgot password?
        </a>
      </div>

      <button
        nz-button
        nzType="primary"
        [nzLoading]="(loading$ | async)!"
        nzBlock
        nzSize="large"
        class="h-12 text-base font-semibold rounded-md"
      >
        Sign In
      </button>

      <div class="mt-4 space-y-3">
        <nz-alert
          *ngIf="showVerificationAlert"
          nzType="warning"
          nzShowIcon
          [nzCloseable]="true"
          (nzOnClose)="showVerificationAlert = false"
        >
          <span nz-alert-description>
            Your email is not verified.
            <button
              nz-button
              nzType="link"
              (click)="resendVerification()"
              [nzLoading]="resending"
              class="p-0 h-auto align-baseline"
            >
              Resend email
            </button>
          </span>
        </nz-alert>

        <nz-alert
          *ngIf="(error$ | async) && !usernameError && !passwordError"
          [nzMessage]="(error$ | async)!"
          nzType="error"
          nzShowIcon
          [nzCloseable]="true"
          (nzOnClose)="authService.clearError()"
        />
      </div>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
      <p class="text-gray-600">
        Don't have an account?
        <a
          routerLink="/register"
          class="font-semibold text-blue-600 hover:text-indigo-500"
        >
          Sign up
        </a>
      </p>
    </div>
  </nz-card>

  <nz-modal
    [(nzVisible)]="showForgotPassword"
    nzTitle="Reset Password"
    (nzOnOk)="handleForgotPassword()"
    [nzOkLoading]="resetLoading"
    nzCentered
  >
    <ng-container *nzModalContent>
      <p class="text-gray-500 mb-4">
        Enter your email address to receive a password reset link.
      </p>
      <input
        nz-input
        nzSize="large"
        [(ngModel)]="resetEmail"
        placeholder="email@example.com"
        type="email"
      />
    </ng-container>
  </nz-modal>
</div>
