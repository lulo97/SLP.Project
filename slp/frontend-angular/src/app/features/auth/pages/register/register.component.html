<div class="min-h-screen bg-linear-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <nz-card class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Create Account</h1>
      <p class="text-gray-600 mt-2">Sign up to get started</p>
    </div>

    <form nz-form (ngSubmit)="handleRegister()" layout="vertical">
      <nz-form-item>
        <nz-form-label>Username</nz-form-label>
        <nz-form-control>
          <nz-input-group nzPrefixIcon="user">
            <input
              nz-input
              [(ngModel)]="form.username"
              name="username"
              placeholder="Choose a username"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Email</nz-form-label>
        <nz-form-control>
          <nz-input-group nzPrefixIcon="mail">
            <input
              nz-input
              type="email"
              [(ngModel)]="form.email"
              name="email"
              placeholder="Enter your email"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Password</nz-form-label>
        <nz-form-control>
          <nz-input-group nzPrefixIcon="lock">
            <input
              nz-input
              type="password"
              [(ngModel)]="form.password"
              name="password"
              placeholder="Create a password"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Confirm Password</nz-form-label>
        <nz-form-control>
          <nz-input-group nzPrefixIcon="lock">
            <input
              nz-input
              type="password"
              [(ngModel)]="form.confirmPassword"
              name="confirmPassword"
              placeholder="Confirm your password"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <button
        nz-button
        nzType="primary"
        [nzLoading]="(loading$ | async)!"
        block
        nzSize="large"
        class="mb-4"
      >
        Sign Up
      </button>

      <div class="text-center">
        <span class="text-gray-600">Already have an account? </span>
        <a routerLink="/login" class="text-blue-600 hover:text-blue-700">
          Sign in
        </a>
      </div>

      <nz-alert
        *ngIf="(error$ | async) as error"
        [nzMessage]="error"
        nzType="error"
        nzShowIcon
        [nzCloseable]="true"
        (nzOnClose)="authService.clearError()"
        class="mt-4"
      />
    </form>
  </nz-card>
</div>
