<div class="min-h-screen bg-linear-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <nz-card class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
      <p class="text-gray-600 mt-2">Enter your new password below</p>
    </div>

    <form nz-form (ngSubmit)="handleReset()" layout="vertical">
      <nz-form-item>
        <nz-form-label>New Password</nz-form-label>
        <nz-form-control>
          <input
            nz-input
            type="password"
            [(ngModel)]="form.password"
            name="password"
            placeholder="Enter new password"
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Confirm Password</nz-form-label>
        <nz-form-control>
          <input
            nz-input
            type="password"
            [(ngModel)]="form.confirm"
            name="confirm"
            placeholder="Confirm new password"
          />
        </nz-form-control>
      </nz-form-item>

      <button
        nz-button
        nzType="primary"
        html-type="submit"
        [nzLoading]="loading"
        block
        nzSize="large"
        class="mb-4"
      >
        Reset Password
      </button>

      <div class="text-center">
        <a routerLink="/login" class="text-blue-600 hover:text-blue-700">
          Back to Login
        </a>
      </div>

      <nz-alert
        *ngIf="error"
        [nzMessage]="error"
        nzType="error"
        nzShowIcon
        [nzCloseable]="true"
        (nzOnClose)="error = null"
        class="mt-4"
      />
    </form>
  </nz-card>
</div>
