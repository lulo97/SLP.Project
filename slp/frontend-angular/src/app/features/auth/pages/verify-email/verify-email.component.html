<div class="min-h-screen bg-linear-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <nz-card class="w-full max-w-md text-center">
    <div *ngIf="loading" class="py-8">
      <nz-spin nzSize="large"></nz-spin>
      <p class="mt-4 text-gray-600">Verifying your email...</p>
    </div>

    <div *ngIf="!loading && verified" class="py-8">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i nz-icon nzType="check-circle" nzTheme="outline" class="text-green-600 text-3xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Email Verified!</h2>
      <p class="text-gray-600 mb-6">Your email has been successfully verified.</p>
      <button nz-button nzType="primary" (click)="router.navigate(['/dashboard'])" nzSize="large">
        Go to Dashboard
      </button>
    </div>

    <div *ngIf="!loading && !verified" class="py-8">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i nz-icon nzType="close-circle" nzTheme="outline" class="text-red-600 text-3xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Verification Failed</h2>
      <p class="text-gray-600 mb-4">{{ error }}</p>
      <button nz-button nzType="primary" (click)="router.navigate(['/login'])" nzSize="large">
        Back to Login
      </button>
    </div>
  </nz-card>
</div>
