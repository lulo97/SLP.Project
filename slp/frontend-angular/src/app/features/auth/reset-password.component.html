<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <nz-card class="w-full max-w-md shadow-lg">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
      <p class="text-gray-500 mt-1">Enter your new password below</p>
    </div>

    <form nz-form [formGroup]="form" (ngSubmit)="handleReset()" nzLayout="vertical">

      <!-- New Password -->
      <nz-form-item>
        <nz-form-label nzRequired>New Password</nz-form-label>
        <nz-form-control
          [nzValidateStatus]="form.get('password')?.invalid && form.get('password')?.dirty ? 'error' : ''"
          nzErrorTip="Password must be at least 6 characters"
        >
          <nz-input-group nzSize="large" [nzPrefix]="prefixLock1" [nzSuffix]="suffixEye1">
            <input
              nz-input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter new password"
            />
          </nz-input-group>
          <ng-template #prefixLock1>
            <i nz-icon nzType="lock" nzTheme="outline" class="text-gray-400"></i>
          </ng-template>
          <ng-template #suffixEye1>
            <i
              nz-icon
              [nzType]="showPassword ? 'eye' : 'eye-invisible'"
              nzTheme="outline"
              class="text-gray-400 cursor-pointer"
              (click)="showPassword = !showPassword"
            ></i>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <!-- Confirm Password -->
      <nz-form-item>
        <nz-form-label nzRequired>Confirm Password</nz-form-label>
        <nz-form-control
          [nzValidateStatus]="passwordMismatch ? 'error' : ''"
          nzErrorTip="Passwords do not match"
        >
          <nz-input-group nzSize="large" [nzPrefix]="prefixLock2" [nzSuffix]="suffixEye2">
            <input
              nz-input
              [type]="showConfirmPassword ? 'text' : 'password'"
              formControlName="confirm"
              placeholder="Confirm new password"
            />
          </nz-input-group>
          <ng-template #prefixLock2>
            <i nz-icon nzType="lock" nzTheme="outline" class="text-gray-400"></i>
          </ng-template>
          <ng-template #suffixEye2>
            <i
              nz-icon
              [nzType]="showConfirmPassword ? 'eye' : 'eye-invisible'"
              nzTheme="outline"
              class="text-gray-400 cursor-pointer"
              (click)="showConfirmPassword = !showConfirmPassword"
            ></i>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <!-- Submit -->
      <button
        nz-button
        nzType="primary"
        nzBlock
        nzSize="large"
        [nzLoading]="loading"
        [disabled]="!token"
        type="submit"
        class="mb-4"
      >
        Reset Password
      </button>

      <div class="text-center text-sm">
        <a routerLink="/login" class="text-blue-600 hover:text-blue-700">Back to Login</a>
      </div>
    </form>

    <nz-alert
      *ngIf="error"
      [nzMessage]="error"
      nzType="error"
      nzShowIcon
      nzCloseable
      (nzOnClose)="error = ''"
      class="mt-4"
    ></nz-alert>

  </nz-card>
</div>
