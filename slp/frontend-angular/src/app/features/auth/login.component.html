<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <nz-card class="w-full max-w-md shadow-lg">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
      <p class="text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form nz-form [formGroup]="form" (ngSubmit)="handleLogin()" nzLayout="vertical">

      <!-- Username -->
      <nz-form-item>
        <nz-form-label nzRequired>Username</nz-form-label>
        <nz-form-control
          [nzValidateStatus]="usernameError ? 'error' : ''"
          [nzErrorTip]="usernameError"
        >
          <nz-input-group nzSize="large" [nzPrefix]="prefixUser">
            <input
              nz-input
              formControlName="username"
              placeholder="Enter your username"
              (input)="clearFieldError('username')"
            />
          </nz-input-group>
          <ng-template #prefixUser>
            <i nz-icon nzType="user" nzTheme="outline" class="text-gray-400"></i>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <!-- Password -->
      <nz-form-item>
        <nz-form-label nzRequired>Password</nz-form-label>
        <nz-form-control
          [nzValidateStatus]="passwordError ? 'error' : ''"
          [nzErrorTip]="passwordError"
        >
          <nz-input-group nzSize="large" [nzPrefix]="prefixLock" [nzSuffix]="suffixEye">
            <input
              nz-input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter your password"
              (input)="clearFieldError('password')"
            />
          </nz-input-group>
          <ng-template #prefixLock>
            <i nz-icon nzType="lock" nzTheme="outline" class="text-gray-400"></i>
          </ng-template>
          <ng-template #suffixEye>
            <i
              nz-icon
              [nzType]="showPassword ? 'eye' : 'eye-invisible'"
              nzTheme="outline"
              class="text-gray-400 cursor-pointer"
              (click)="showPassword = !showPassword"
            ></i>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <!-- Forgot password link -->
      <div class="text-right -mt-2 mb-4">
        <button nz-button nzType="link" type="button" class="!p-0" (click)="showForgotPassword = true">
          Forgot password?
        </button>
      </div>

      <!-- Submit -->
      <button
        nz-button
        nzType="primary"
        nzBlock
        nzSize="large"
        [nzLoading]="loading"
        type="submit"
        class="mb-4"
      >
        Sign In
      </button>

      <!-- Register link -->
      <div class="text-center text-sm">
        <span class="text-gray-500">Don't have an account? </span>
        <a routerLink="/register" class="text-blue-600 hover:text-blue-700 font-medium">Sign up</a>
      </div>
    </form>

    <!-- Email not verified alert -->
    <nz-alert
      *ngIf="showVerificationAlert"
      nzType="warning"
      nzShowIcon
      nzCloseable
      (nzOnClose)="showVerificationAlert = false"
      [nzMessage]="verifyAlertMsg"
      class="mt-4"
    ></nz-alert>
    <ng-template #verifyAlertMsg>
      <span>Your email is not verified. </span>
      <button nz-button nzType="link" class="!p-0" (click)="resendVerification()" [nzLoading]="resending">
        Resend verification email
      </button>
    </ng-template>

    <!-- General error alert -->
    <nz-alert
      *ngIf="generalError"
      [nzMessage]="generalError"
      nzType="error"
      nzShowIcon
      nzCloseable
      (nzOnClose)="generalError = ''"
      class="mt-4"
    ></nz-alert>

  </nz-card>
</div>

<!-- Forgot Password Modal -->
<nz-modal
  [(nzVisible)]="showForgotPassword"
  nzTitle="Reset Password"
  (nzOnOk)="handleForgotPassword()"
  [nzOkLoading]="resetLoading"
  nzOkText="Send Reset Link"
>
  <ng-container *nzModalContent>
    <p class="mb-4 text-gray-600">Enter your email address to receive a password reset link.</p>
    <input nz-input [(ngModel)]="resetEmail" placeholder="Email address" type="email" />
  </ng-container>
</nz-modal>
